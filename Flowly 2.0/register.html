<!DOCTYPE html>
<html>
<head>
  <title>Register</title>

  <style>

  .top-bar {
  position: fixed;
  top: 20px;
  left: 20px;
}

.home-btn {
  text-decoration: none;
  color: #3b82f6;
  font-size: 16px;
  font-weight: bold;
}
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f8fafc, #dbeafe, #e0f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #1e293b;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #2563eb;
    }

    a {
      text-decoration: none;
      color: #3b82f6;
    }

    .links {
      margin-top: 15px;
      font-size: 14px;
    }

    #message {
      margin-top: 10px;
      font-size: 14px;
      color: red;
    }
  </style>
</head>

<body>

<div class="top-bar">
  <a href="websitepage.html" class="home-btn">← Home</a>
</div>

<div class="container">

    
  <h2>Register</h2>

  <form onsubmit="registerUser(event)">
    <input type="text" id="username" placeholder="Username" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>

    <button type="submit">Register</button>
  </form>

  <div class="links">
    <p>Already have an account? <a href="login1.html">Login</a></p>
  </div>

  <p id="message"></p>
</div>

<script>

/* =========================
   REGISTER USER
   CONNECTS TO FLASK BACKEND
========================= */

function registerUser(event) {
  event.preventDefault();

  let username = document.getElementById("username").value;
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  /* =========================
     SEND TO BACKEND
     (YOU NEED /register ROUTE)
  ========================= */

  fetch("http://127.0.0.1:5000/register", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      username: username,
      email: email,
      password: password
    })
  })
  .then(res => res.json())
  .then(data => {

    let msg = document.getElementById("message");

    if (data.success) {
      msg.style.color = "green";
      msg.innerText = "Registration successful!";

      // redirect after success
      setTimeout(() => {
        window.location.href = "login1.html";
      }, 1000);

    } else {
      msg.style.color = "red";
      msg.innerText = data.message || "Registration failed!";
    }

  })
  .catch(err => {
    console.log(err);

    let msg = document.getElementById("message");
    msg.style.color = "red";
    msg.innerText = "Server error. Please try again.";
  });

}

</script>

</body>
</html>
