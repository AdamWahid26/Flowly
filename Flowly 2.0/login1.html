<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <style>

    .top-bar {
  position: fixed;
  top: 20px;
  left: 20px;
}

.home-btn {
  text-decoration: none;
  color: #3b82f6;
  font-size: 16px;
  font-weight: bold;
}
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f8fafc, #dbeafe, #e0f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #1e293b;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #2563eb;
    }

    a {
      text-decoration: none;
      color: #3b82f6;
    }

    .links {
      margin-top: 15px;
      font-size: 14px;
    }

    #message {
      margin-top: 10px;
      font-size: 14px;
      color: red;
    }
  </style>
</head>

<body>

<div class="top-bar">
  <a href="websitepage.html" class="home-btn">← Home</a>
</div>
<div class="container">
  <h2>Login</h2>

  <form onsubmit="loginUser(event)">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>

    <button type="submit">Login</button>
  </form>

  <div class="links">
    <p>Don't have an account? <a href="register.html">Register</a></p>
    <p><a href="forgot.html">Forgot Password?</a></p>
  </div>

  <p id="message"></p>
</div>

<script>

/* =========================
   LOGIN SYSTEM
   CONNECTS TO FLASK BACKEND
   (replace fake login logic)
========================= */

function loginUser(event) {
  event.preventDefault();

  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  /* =========================
     SEND LOGIN DATA TO BACKEND
     (YOU NEED THIS ROUTE LATER)
     POST /login
  ========================= */

  fetch("http://127.0.0.1:5000/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email: email,
      password: password
    })
  })
  .then(res => res.json())
  .then(data => {

    let msg = document.getElementById("message");

    if (data.success) {
      msg.style.color = "green";
      msg.innerText = "Login successful!";

      // redirect after login success
      window.location.href = "dashboard.html";
    } 
    else {
      msg.style.color = "red";
      msg.innerText = data.message || "Invalid email or password!";
    }

  })
  .catch(err => {
    console.log(err);

    let msg = document.getElementById("message");
    msg.style.color = "red";
    msg.innerText = "Server error. Please try again.";
  });

}

</script>

</body>
</html>
