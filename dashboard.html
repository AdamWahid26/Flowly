<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8fafc;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: white;
      border-bottom: 1px solid #e2e8f0;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .nav-item {
      cursor: pointer;
      font-weight: 500;
    }

    .nav-item.active {
      color: #3b82f6;
      font-weight: bold;
    }

    .profile {
      position: relative;
      cursor: pointer;
    }

    .profile-menu {
      display: none;
      position: absolute;
      right: 0;
      top: 30px;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      width: 180px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .profile-menu div {
      padding: 10px;
      cursor: pointer;
    }

    .profile-menu div:hover {
      background: #f1f5f9;
    }

    /* DASHBOARD */
    .container {
      padding: 30px;
    }

    .grid {
      display: flex;
      gap: 20px;
    }

    .card {
      flex: 1;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 10px rgba(0,0,0,0.05);
      min-height: 200px;
    }

    .card h3 {
      margin-top: 0;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 10px;
    }

    /* SAMPLE ITEMS */
    .item {
      padding: 8px;
      margin-top: 5px;
      background: #f1f5f9;
      border-radius: 6px;
    }

  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-left">
    <div class="nav-item active" onclick="goHome()">Home</div>
    <div class="nav-item" onclick="goWork()">Work</div>
    <div class="nav-item">Calendar</div>
  </div>

  <div class="profile" onclick="toggleMenu()">
    👤
    <div class="profile-menu" id="menu">
      <div onclick="goProfile()">Profile</div>
      <div onclick="goSettings()">Settings</div>
      <div onclick="logout()">Logout</div>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="container">
  <div class="grid">

    <!-- TO DO -->
    <div class="card">
      <h3>To Do</h3>
      <div class="item">Math Assignment</div>
      <div class="item">Group Project</div>
    </div>

    <!-- REMINDER -->
    <div class="card">
      <h3>Reminder</h3>
      <div class="item">Assignment due tomorrow</div>
      <div class="item">Meeting at 5 PM</div>
    </div>

    <!-- CALENDAR -->
    <div class="card">
      <h3>Calendar</h3>
      <div class="item">Mon</div>
      <div class="item">Tue</div>
      <div class="item">Wed</div>
    </div>

  </div>
</div>

<script>
function toggleMenu() {
  let menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function goHome() {
  window.location.href = "dashboard.html";
}

function goWork() {
  window.location.href = "work.html";
}

function goProfile() {
  window.location.href = "profile.html";
}

function goSettings() {
  window.location.href = "settings.html";
}

function logout() {
  window.location.href = "login1.html";
}
</script>

</body>
</html>
