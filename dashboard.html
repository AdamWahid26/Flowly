<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <style>
   body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #f8fafc, #e0f2fe);
  }

  /* NAVBAR */
  .navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: white;
    border-bottom: 1px solid #e2e8f0;
  }

  .nav-left {
    display: flex;
    align-items: center;
    gap: 25px;
  }

  .nav-item {
    cursor: pointer;
    font-weight: 500;
    color: #475569;
  }

  .nav-item.active {
    color: #3b82f6;
    font-weight: bold;
    border-bottom: 2px solid #3b82f6;
    padding-bottom: 5px;
  }

  /* PROFILE */
  .profile {
    position: relative;
    cursor: pointer;
    font-size: 20px;
  }

  .profile-menu {
    display: none;
    position: absolute;
    right: 0;
    top: 35px;
    background: white;
    border-radius: 8px;
    width: 180px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
  }

  .profile-menu div {
    padding: 12px;
    cursor: pointer;
  }

  .profile-menu div:hover {
    background: #f1f5f9;
  }

  /* DASHBOARD */
  .container {
    padding: 30px;
  }

  .grid {
    display: flex;
    gap: 20px;
  }

  .card {
    flex: 1;
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    min-height: 220px;
  }

  .card h3 {
    margin-top: 0;
    border-bottom: 2px solid #e2e8f0;
    padding-bottom: 10px;
    color: #1e293b;
  }

  /* ITEMS */
  .item {
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    font-size: 14px;
  }

  /* STATUS COLORS */
  .urgent {
    background: #fee2e2;
    color: #b91c1c;
  }

  .warning {
    background: #fef3c7;
    color: #92400e;
  }

  .done {
    background: #dcfce7;
    color: #166534;
  }

  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-left">
    <div class="nav-item active" onclick="goHome()">Home</div>
    <div class="nav-item" onclick="goWork()">Work</div>
    <div class="nav-item">Calendar</div>
  </div>

  <div class="profile" onclick="toggleMenu()">
    👤
    <div class="profile-menu" id="menu">
      <div onclick="goProfile()">Profile</div>
      <div onclick="goSettings()">Settings</div>
      <div onclick="logout()">Logout</div>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="container">
  <div class="grid">

    <!-- TO DO -->
    <div class="card">
  <h3>To Do</h3>
  <div class="item urgent">Math Assignment (Due Tomorrow)</div>
  <div class="item warning">Group Project (3 days left)</div>
  <div class="item done">English Essay (Completed)</div>
</div>

    <!-- REMINDER -->
    <div class="card">
      <h3>Reminder</h3>
      <div class="item">Assignment due tomorrow</div>
      <div class="item">Meeting at 5 PM</div>
    </div>

    <!-- CALENDAR -->
    <div class="card">
      <h3>Calendar</h3>
      <div class="item">Mon</div>
      <div class="item">Tue</div>
      <div class="item">Wed</div>
    </div>

  </div>
</div>

<script>
function toggleMenu() {
  let menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function goHome() {
  window.location.href = "dashboard.html";
}

function goWork() {
  window.location.href = "work.html";
}

function goProfile() {
  window.location.href = "profile.html";
}

function goSettings() {
  window.location.href = "settings.html";
}

function logout() {
  window.location.href = "login1.html";
}
</script>

</body>
</html>
