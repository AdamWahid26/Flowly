<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coursework Management</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Coursework Management System</h1>

    <h2>Add Coursework</h2>

    <form method="POST" action="/add">
        <input type="text" name="title" placeholder="Enter coursework title" required><br><br>

        <textarea name="description" placeholder="Enter coursework description" required></textarea><br><br>

        <input type="date" name="due_date" required><br><br>

        <button type="submit">Add Coursework</button>
    </form>
</body>
</html>
