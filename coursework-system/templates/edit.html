<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Coursework</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Edit Coursework</h1>

    <form method="POST" action="/update/{{ coursework[0] }}">
        <input type="text" name="title" value="{{ coursework[1] }}" required>

        <textarea name="description" required>{{ coursework[2] }}</textarea>

        <input type="date" name="due_date" value="{{ coursework[3] }}" required>

        <button type="submit">Update Coursework</button>
    </form>

    <br>
    <a href="/">Back to Home</a>
</body>
</html>
