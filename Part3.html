<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flowly Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>📚 Flowly - Group Dashboard</h1>

<!-- Add Member -->
<div class="card">
  <h2>Add Group Member</h2>
  <input type="text" id="name" placeholder="Name">
  <input type="email" id="email" placeholder="Email">
  <input type="text" id="role" placeholder="Role">
  <button onclick="addMember()">Add Member</button>
</div>

<!-- Add Coursework -->
<div class="card">
  <h2>Add Coursework</h2>
  <input type="text" id="coursework" placeholder="Coursework Title">
  <input type="date" id="deadline">
  <button onclick="addCoursework()">Add Coursework</button>
</div>

<!-- Dashboard -->
<div class="card">
  <h2>Upcoming Due</h2>
  <div id="dashboard"></div>
</div>

<script src="script.js"></script>
</body>
</html>
